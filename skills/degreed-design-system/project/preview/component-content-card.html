<!doctype html>
<html><head><meta charset="utf-8"><title>Content card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #FBFBFB; font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: #fff; border: 1px solid #E2E8EB; border-radius: 12px; box-shadow: 0 1px 2px rgba(53,60,66,0.08); overflow: hidden; display: grid; grid-template-columns: 120px 1fr; }
  .thumb { background: linear-gradient(135deg,#E9F7FE,#D6F0FF); display: flex; align-items: center; justify-content: center; }
  .thumb img { width: 28px; height: 28px; opacity: .7; }
  .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
  .eyebrow { font: 800 10px/1 var(--font-sans); text-transform: uppercase; letter-spacing: .04em; color: #5B737F; }
  .title { font: 590 15px/20px var(--font-sans); color: #0F1F2C; }
  .meta { font: 500 12px/16px var(--font-sans); color: #5B737F; display: flex; gap: 8px; align-items: center; }
  .dot { width: 3px; height: 3px; background: #A3B5BD; border-radius: 50%; }
</style></head><body>
<div class="card">
  <div class="thumb"><img src="../assets/icons/course.svg"></div>
  <div class="body">
    <div class="eyebrow">Course</div>
    <div class="title">Practical SQL for Analysts</div>
    <div class="meta">Coursera<span class="dot"></span>4h 20m<span class="dot"></span>★ 4.6</div>
  </div>
</div>
<div class="card">
  <div class="thumb" style="background:linear-gradient(135deg,#FFECE8,#FFFAEC)"><img src="../assets/icons/article.svg"></div>
  <div class="body">
    <div class="eyebrow">Article</div>
    <div class="title">The pragmatist's guide to skill-mapping</div>
    <div class="meta">HBR<span class="dot"></span>12 min read</div>
  </div>
</div>
</body></html>
