<!doctype html>
<html><head><meta charset="utf-8"><title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #fff; font-family: var(--font-sans); display: grid; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  label { font: 590 13px/16px var(--font-sans); color: var(--fg-strong); }
  input { height: 40px; padding: 0 12px; border: 1px solid #C9D3D8; border-radius: 6px; font: 400 14px/1 var(--font-sans); color: #0F1F2C; outline: none; }
  input::placeholder { color: #A3B5BD; }
  .focused { border-color: #0062E3; box-shadow: 0 0 0 2px #9DC6FC; }
  .error { border-color: #DE0546; box-shadow: 0 0 0 2px #FFC9D3; }
  .err-msg { font-size: 12px; color: #DE0546; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style></head><body>
<div class="grid">
  <div class="field"><label>Email</label><input value="jordan@example.com"></div>
  <div class="field"><label>Skill</label><input class="focused" value="React"></div>
  <div class="field"><label>Password</label><input class="error" type="password" value="abc"><div class="err-msg">At least 8 characters.</div></div>
  <div class="field"><label>Search</label><input placeholder="Search the catalog…"></div>
</div>
</body></html>
