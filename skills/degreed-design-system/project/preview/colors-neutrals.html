<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; font-family: var(--font-sans); background: #fff; }
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .step { border-radius: 6px; height: 64px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; font-size: 10px; font-family: var(--font-mono); }
</style></head><body>
<div class="row">
  <div class="step" style="background:#FFFFFF;color:#0F1F2C;border:1px solid #E2E8EB">white</div>
  <div class="step" style="background:#FBFBFB;color:#0F1F2C">50</div>
  <div class="step" style="background:#F4F6F7;color:#0F1F2C">100</div>
  <div class="step" style="background:#E2E8EB;color:#0F1F2C">200</div>
  <div class="step" style="background:#C9D3D8;color:#0F1F2C">300</div>
  <div class="step" style="background:#A3B5BD;color:#fff">400</div>
  <div class="step" style="background:#768E9A;color:#fff">500</div>
  <div class="step" style="background:#5B737F;color:#fff">600</div>
  <div class="step" style="background:#4E606C;color:#fff">700</div>
  <div class="step" style="background:#44515A;color:#fff">800</div>
  <div class="step" style="background:#353C42;color:#fff">950</div>
</div>
<div style="height:8px"></div>
<div style="font-size:11px;color:#5B737F;font-family:var(--font-sans)">Neutral scale · cool-leaning grays · backgrounds · borders · body text</div>
</body></html>
