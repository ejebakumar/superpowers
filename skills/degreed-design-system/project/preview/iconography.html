<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 14px 16px; background: #fff; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(14, 1fr); gap: 10px 8px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .cell img { width: 20px; height: 20px; }
  .cell span { font-size: 9px; color: var(--fg-muted); font-family: var(--font-mono); }
  h4 { margin: 0 0 6px; font-size: 11px; color: var(--fg-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
</style></head><body>
<h4>Fresco icon set · 16px line · stroke 1.5px · currentColor</h4>
<div class="grid">
  <div class="cell"><img src="../assets/icons/home.svg"><span>home</span></div>
  <div class="cell"><img src="../assets/icons/magnifying-glass.svg"><span>search</span></div>
  <div class="cell"><img src="../assets/icons/bell.svg"><span>bell</span></div>
  <div class="cell"><img src="../assets/icons/bookmark.svg"><span>bookmark</span></div>
  <div class="cell"><img src="../assets/icons/heart.svg"><span>heart</span></div>
  <div class="cell"><img src="../assets/icons/star.svg"><span>star</span></div>
  <div class="cell"><img src="../assets/icons/checkmark.svg"><span>check</span></div>
  <div class="cell"><img src="../assets/icons/cross.svg"><span>cross</span></div>
  <div class="cell"><img src="../assets/icons/plus.svg"><span>plus</span></div>
  <div class="cell"><img src="../assets/icons/dots.svg"><span>dots</span></div>
  <div class="cell"><img src="../assets/icons/play.svg"><span>play</span></div>
  <div class="cell"><img src="../assets/icons/clock.svg"><span>clock</span></div>
  <div class="cell"><img src="../assets/icons/calendar.svg"><span>cal</span></div>
  <div class="cell"><img src="../assets/icons/book.svg"><span>book</span></div>
  <div class="cell"><img src="../assets/icons/course.svg"><span>course</span></div>
  <div class="cell"><img src="../assets/icons/video.svg"><span>video</span></div>
  <div class="cell"><img src="../assets/icons/article.svg"><span>article</span></div>
  <div class="cell"><img src="../assets/icons/page.svg"><span>page</span></div>

  <div class="cell"><img src="../assets/icons/gear.svg"><span>gear</span></div>
  <div class="cell"><img src="../assets/icons/info.svg"><span>info</span></div>

</div>
</body></html>
