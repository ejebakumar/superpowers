<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px 24px; background: #fff; font-family: var(--font-sans); color: var(--fg-default); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; }
  .meta { font-size: 11px; color: var(--fg-muted); font-family: var(--font-mono); min-width: 160px; }
  .body { font: 400 14px/22px var(--font-sans); }
  .body-strong { font: 590 14px/22px var(--font-sans); color: var(--fg-strong); }
  .meta-text { font: 500 12px/16px var(--font-sans); color: var(--fg-muted); }
  .caps { font: 800 12px/16px var(--font-sans); text-transform: uppercase; letter-spacing: 0.02em; color: var(--fg-strong); }
  .mono { font: 400 13px/20px var(--font-mono); }
</style></head><body>
<div class="row"><div class="meta">body · 14/22 · 400</div><div class="body">Maestro can help you find your next thing to learn.</div></div>
<div class="row"><div class="meta">body-strong · 590</div><div class="body-strong">You're 3 hours away from finishing.</div></div>
<div class="row"><div class="meta">meta · 12/16 · 500</div><div class="meta-text">Updated 2 days ago · 12 min read</div></div>
<div class="row"><div class="meta">caps · 12/16 · 800</div><div class="caps">Recommended pathways</div></div>
<div class="row"><div class="meta">mono · 13/20</div><div class="mono">--text-body-size: 14px;</div></div>
</body></html>
