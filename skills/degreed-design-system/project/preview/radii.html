<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #fff; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .tile { aspect-ratio: 1; background: var(--color-primary-100); border: 1px solid var(--color-primary-300); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .name { font-size: 11px; color: var(--color-primary-800); font-weight: 600; margin-top: 4px; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style></head><body>
<div class="grid">
  <div class="tile" style="border-radius:4px"><div class="name">sm</div><div class="px">4px</div></div>
  <div class="tile" style="border-radius:6px"><div class="name">md</div><div class="px">6px · inputs</div></div>
  <div class="tile" style="border-radius:8px"><div class="name">lg</div><div class="px">8px · default</div></div>
  <div class="tile" style="border-radius:12px"><div class="name">xl</div><div class="px">12px · cards</div></div>
  <div class="tile" style="border-radius:16px"><div class="name">2xl</div><div class="px">16px · hero</div></div>
  <div class="tile" style="border-radius:9999px"><div class="name">pill</div><div class="px">∞ · chips</div></div>
</div>
</body></html>
