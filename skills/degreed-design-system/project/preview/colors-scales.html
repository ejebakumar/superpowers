<!doctype html>
<html><head><meta charset="utf-8"><title>Primary scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; font-family: var(--font-sans); background: #fff; }
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; margin-bottom: 10px; }
  .step { border-radius: 6px; height: 56px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; font-size: 10px; font-family: var(--font-mono); }
  .label { font-size: 11px; color: #5B737F; margin-bottom: 4px; font-family: var(--font-sans); }
</style></head><body>
<div class="label">PRIMARY · Apollo blue (brand True Blue lives at 800)</div>
<div class="row">
  <div class="step" style="background:#F3FBFF;color:#0F1F2C">50</div>
  <div class="step" style="background:#EDF9FF;color:#0F1F2C">100</div>
  <div class="step" style="background:#D6F0FF;color:#0F1F2C">200</div>
  <div class="step" style="background:#B5E7FF;color:#0F1F2C">300</div>
  <div class="step" style="background:#83D9FF;color:#0F1F2C">400</div>
  <div class="step" style="background:#48C2FF;color:#fff">500</div>
  <div class="step" style="background:#1EA1FF;color:#fff">600</div>
  <div class="step" style="background:#0682FF;color:#fff">700</div>
  <div class="step" style="background:#0062E3;color:#fff;outline:2px solid #0F1F2C;outline-offset:1px">800</div>
  <div class="step" style="background:#0854C5;color:#fff">900</div>
  <div class="step" style="background:#0D4A9B;color:#fff">950</div>
</div>
<div class="label">ACCENT · purple (charts, expressive moments)</div>
<div class="row">
  <div class="step" style="background:#F9F5FF;color:#0F1F2C">50</div>
  <div class="step" style="background:#F1E6FF;color:#0F1F2C">100</div>
  <div class="step" style="background:#E7D4FF;color:#0F1F2C">200</div>
  <div class="step" style="background:#D3B1FF;color:#0F1F2C">300</div>
  <div class="step" style="background:#BF8DFF;color:#0F1F2C">400</div>
  <div class="step" style="background:#AB69FF;color:#fff">500</div>
  <div class="step" style="background:#9746FF;color:#fff">600</div>
  <div class="step" style="background:#8322FF;color:#fff">700</div>
  <div class="step" style="background:#6800EE;color:#fff">800</div>
  <div class="step" style="background:#5200BB;color:#fff">900</div>
  <div class="step" style="background:#3C0088;color:#fff">950</div>
</div>
</body></html>
