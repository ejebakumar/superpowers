<!doctype html>
<html><head><meta charset="utf-8"><title>Illustrations</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 14px; background: #fff; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .cell { background: #E9F7FE; border-radius: 8px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; padding: 8px; }
  .cell img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .cap { font-size: 10px; color: var(--fg-muted); text-align: center; margin-top: 3px; font-family: var(--font-mono); }
  .item { display: flex; flex-direction: column; }
</style></head><body>
<div class="grid">
  <div class="item"><div class="cell"><img src="../assets/illustrations/curious-cat.png"></div><div class="cap">curious-cat</div></div>
  <div class="item"><div class="cell" style="background:#FFFAEC"><img src="../assets/illustrations/mug-hot-drink.png"></div><div class="cap">mug</div></div>
  <div class="item"><div class="cell"><img src="../assets/illustrations/paper-airplane.png"></div><div class="cap">airplane</div></div>
  <div class="item"><div class="cell" style="background:#FFECE8"><img src="../assets/illustrations/mountain-path.png"></div><div class="cap">mountain</div></div>
  <div class="item"><div class="cell"><img src="../assets/illustrations/puzzle-cube.png"></div><div class="cap">puzzle</div></div>
  <div class="item"><div class="cell" style="background:#FFFAEC"><img src="../assets/illustrations/glasses-balloons.png"></div><div class="cap">balloons</div></div>
  <div class="item"><div class="cell"><img src="../assets/illustrations/handshake.png"></div><div class="cap">handshake</div></div>
  <div class="item"><div class="cell" style="background:#FFECE8"><img src="../assets/illustrations/megaphone.png"></div><div class="cap">megaphone</div></div>
  <div class="item"><div class="cell"><img src="../assets/illustrations/learning-book.png"></div><div class="cap">book</div></div>
  <div class="item"><div class="cell" style="background:#FFFAEC"><img src="../assets/illustrations/all-in-one.png"></div><div class="cap">all-in-one</div></div>
</div>
</body></html>
