<!doctype html>
<html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; font-family: var(--font-sans); background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .swatch { border-radius: 8px; padding: 14px 12px; height: 96px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border-default); }
  .swatch .name { font-size: 13px; font-weight: 600; }
  .swatch .hex { font-family: var(--font-mono); font-size: 11px; opacity: .8; }
</style></head><body>
<div class="grid">
  <div class="swatch" style="background:#0062E3;color:#fff;border-color:transparent"><div class="name">True Blue</div><div class="hex">#0062E3</div></div>
  <div class="swatch" style="background:#0F1F2C;color:#fff;border-color:transparent"><div class="name">Moon Shot</div><div class="hex">#0F1F2C</div></div>
  <div class="swatch" style="background:#FF7F64;color:#0F1F2C;border-color:transparent"><div class="name">Fry Sauce</div><div class="hex">#FF7F64</div></div>
  <div class="swatch" style="background:#FED141;color:#0F1F2C;border-color:transparent"><div class="name">Gold Metal</div><div class="hex">#FED141</div></div>
  <div class="swatch" style="background:#E9F7FE;color:#0F1F2C"><div class="name">Skys the Limit</div><div class="hex">#E9F7FE</div></div>
  <div class="swatch" style="background:#FFECE8;color:#0F1F2C"><div class="name">Think Pink</div><div class="hex">#FFECE8</div></div>
  <div class="swatch" style="background:#FFFAEC;color:#0F1F2C"><div class="name">Champagne</div><div class="hex">#FFFAEC</div></div>
  <div class="swatch" style="background:#F3F4F4;color:#0F1F2C"><div class="name">Karl the Fog</div><div class="hex">#F3F4F4</div></div>
  <div class="swatch" style="background:#FFFFFF;color:#0F1F2C"><div class="name">White</div><div class="hex">#FFFFFF</div></div>
  <div class="swatch" style="background:#FBFBFB;color:#0F1F2C"><div class="name">Page</div><div class="hex">#FBFBFB</div></div>
</div>
</body></html>
