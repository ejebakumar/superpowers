<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px 24px; background: #fff; font-family: var(--font-sans); color: var(--fg-strong); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; }
  .meta { font-size: 11px; color: var(--fg-muted); font-family: var(--font-mono); min-width: 140px; }
  .h1 { font: 700 36px/40px var(--font-sans); letter-spacing: -0.01em; }
  .h2 { font: 700 30px/36px var(--font-sans); }
  .h3 { font: 700 24px/32px var(--font-sans); }
  .h4 { font: 800 18px/28px var(--font-sans); }
</style></head><body>
<div class="row"><div class="meta">h1 · 36/40 · 700</div><div class="h1">Continue learning</div></div>
<div class="row"><div class="meta">h2 · 30/36 · 700</div><div class="h2">Recommended for you</div></div>
<div class="row"><div class="meta">h3 · 24/32 · 700</div><div class="h3">Practical SQL</div></div>
<div class="row"><div class="meta">h4 · 18/28 · 800</div><div class="h4">Up next in your plan</div></div>
</body></html>
